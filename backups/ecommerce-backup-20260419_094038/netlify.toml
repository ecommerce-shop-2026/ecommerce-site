# Netlify部署配置
# 这个文件告诉Netlify如何部署你的网站

# 构建命令（不需要，因为是静态网站）
# build command: 

# 发布目录
publish = "."

# 重定向规则（可选）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 自定义404页面
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

# 安全头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# 环境变量（可选）
[build.environment]
  NODE_VERSION = "18"