<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        h1 { color: blue; }
    </style>
</head>
<body>
    <h1>测试页面 - 如果这个显示，说明GitHub Pages工作正常</h1>
    <p>这是一个简单的测试页面。</p>
    <p>当前时间: <span id="time"></span></p>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
